<div class="group/msg">

  <!-- Card wraps only the content -->
  <div class="bg-neutral-900/70 backdrop-blur-sm rounded-2xl px-4 py-3 border border-white/6">
    <div
      #container
      class="prose prose-invert prose-sm max-w-none
             prose-p:my-1.5 prose-ul:my-1.5 prose-ol:my-1.5 prose-li:my-0.5
             prose-headings:text-white prose-strong:text-white prose-a:text-cyan-400"
    >
      <markdown [data]="content" (ready)="onMarkdownReady()" />
    </div>
  </div>

  <!-- Action buttons — outside the card, appear on hover -->
  @if (!streaming) {
    <div class="flex items-center gap-1 mt-1.5 ml-1 opacity-0 group-hover/msg:opacity-100 transition-opacity">
      <!-- Copy response -->
      <button
        (click)="copyResponse()"
        class="flex items-center gap-1.5 px-2 py-1 rounded-md text-neutral-500 hover:text-neutral-300 hover:bg-white/5 text-xs transition-colors"
      >
        @if (responseCopied()) {
          <svg class="w-3.5 h-3.5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
          <span class="text-cyan-400">Copied!</span>
        } @else {
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2" stroke-width="2"/>
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke-width="2"/>
          </svg>
          <span>Copy response</span>
        }
      </button>
      <!-- Download Excel (only when response contains tables) -->
      @if (hasTable) {
        <button
          (click)="downloadExcel()"
          class="flex items-center gap-1.5 px-2 py-1 rounded-md text-neutral-500 hover:text-cyan-400 hover:bg-cyan-500/10 text-xs transition-colors"
          title="Download as Excel"
        >
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3M3 17V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          </svg>
          <span>Download Excel</span>
        </button>
      }
      <!-- Regenerate -->
      @if (showRegenerate) {
        <button
          (click)="regenerate.emit()"
          class="flex items-center gap-1.5 px-2 py-1 rounded-md text-neutral-500 hover:text-neutral-300 hover:bg-white/5 text-xs transition-colors"
        >
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          </svg>
          <span>Regenerate</span>
        </button>
      }
    </div>
  }

</div>
