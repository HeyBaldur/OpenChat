@if (successfulCalls.length > 0) {
  <div class="flex flex-wrap items-center gap-2 mt-3">
    <span class="flex items-center gap-1 text-neutral-500 text-xs [&>svg]:text-cyan-400 font-semibold">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
        <path d="M3 20h7"/>
        <path d="M14 20h7"/>
        <path d="M10 20a2 2 0 1 0 4 0a2 2 0 0 0 -4 0"/>
        <path d="M12 16v2"/>
        <path d="M8 16.004h-1.343c-2.572 -.004 -4.657 -2.011 -4.657 -4.487c0 -2.475 2.085 -4.482 4.657 -4.482c.393 -1.762 1.794 -3.2 3.675 -3.773c1.88 -.572 3.956 -.193 5.444 1c1.488 1.19 2.162 3.007 1.77 4.769h.99c1.913 0 3.464 1.56 3.464 3.486c0 1.927 -1.551 3.487 -3.465 3.487h-2.535"/>
      </svg>
      Sources:
    </span>
    @for (call of successfulCalls; track call.sourceUrl) {
      <button
        (click)="open(call.sourceUrl!)"
        class="px-3 py-1 rounded-full bg-neutral-800 border border-neutral-700
               text-neutral-300 text-xs font-mono
               hover:border-cyan-500/50 hover:text-cyan-400
               transition-colors duration-150 cursor-pointer"
      >
        {{ chipLabel(call.sourceUrl!) }}
      </button>
    }
  </div>
}
