@if (editing) {

  <!-- Inline edit mode -->
  <div class="flex flex-col items-end gap-2 w-full pb-3">

    <!-- Wrapper clips scrollbar inside the rounded border -->
    <div class="w-full max-w-[75%] rounded-2xl overflow-hidden border border-purple-500/50 bg-neutral-800">
      <textarea
        #editArea
        [(ngModel)]="editText"
        (keydown)="onKeyDown($event)"
        (input)="autoResize()"
        rows="1"
        class="w-full bg-transparent text-white px-5 py-3 text-sm
               resize-none overflow-y-auto max-h-40
               focus:outline-none leading-relaxed"
      ></textarea>
    </div>

    <div class="flex gap-2">
      <button
        (click)="cancelEdit()"
        class="px-3 py-1.5 rounded-lg text-xs text-neutral-400 hover:text-neutral-200 hover:bg-white/5 transition-colors"
      >Cancel</button>
      <button
        (click)="confirmEdit()"
        class="px-4 py-1.5 rounded-lg text-xs bg-gradient-to-r from-purple-600 to-blue-500 hover:from-purple-500 hover:to-blue-400 text-white font-medium transition-all"
      >Send</button>
    </div>

  </div>

} @else {

  <!-- Normal display mode -->
  <div class="group/user flex flex-col items-end gap-1 pb-3">
    <div class="max-w-[75%] bg-gradient-to-br from-purple-600/80 to-blue-600/70 text-white rounded-3xl rounded-br-lg px-5 py-3 text-sm leading-relaxed whitespace-pre-wrap shadow-md shadow-purple-900/20">{{ content }}</div>

    <div class="flex items-center gap-0.5 opacity-0 group-hover/user:opacity-100 transition-opacity">

      <!-- Copy — always available -->
      <button
        (click)="copyMessage()"
        class="flex items-center gap-1 px-2 py-1 rounded-md text-neutral-500 hover:text-neutral-300 hover:bg-white/5 text-xs transition-colors"
      >
        @if (copied()) {
          <svg class="w-3.5 h-3.5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
          <span class="text-cyan-400">Copied!</span>
        } @else {
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <rect x="9" y="9" width="13" height="13" rx="2" stroke-width="2"/>
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke-width="2"/>
          </svg>
          <span>Copy</span>
        }
      </button>

      <!-- Edit — blocked while streaming -->
      @if (!disableEdit) {
        <button
          (click)="startEdit()"
          class="flex items-center gap-1 px-2 py-1 rounded-md text-neutral-500 hover:text-neutral-300 hover:bg-white/5 text-xs transition-colors"
        >
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
          </svg>
          <span>Edit</span>
        </button>
      }

    </div>
  </div>

}
