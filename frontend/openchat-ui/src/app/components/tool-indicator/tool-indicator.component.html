<div
  class="flex items-center gap-2 px-3 py-2 rounded-md bg-neutral-900/50 border-l-2 text-xs transition-colors duration-200 w-fit"
  [class.border-cyan-400]="call.status === 'running' || call.status === 'done'"
  [class.border-orange-400]="call.status === 'failed'"
>
  @if (call.status === 'running') {
    <!-- Pulsing search icon -->
    <svg class="w-3.5 h-3.5 text-cyan-400 animate-pulse shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
    </svg>
    <span class="text-cyan-400 font-mono">Reading {{ label }}...</span>
  }

  @if (call.status === 'done') {
    <svg class="w-3.5 h-3.5 text-cyan-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
    </svg>
    <span class="text-neutral-400 font-mono">Read {{ label }}</span>
  }

  @if (call.status === 'failed') {
    <span
      class="flex items-center gap-2 text-orange-400"
      [title]="errorTooltip"
    >
      <svg class="w-3.5 h-3.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
      </svg>
      <span class="font-mono">Failed to read {{ label }}</span>
    </span>
  }
</div>
