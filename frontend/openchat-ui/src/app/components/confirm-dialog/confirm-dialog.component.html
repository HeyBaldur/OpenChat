@if (confirmService.dialog(); as dialog) {

  <!-- Backdrop -->
  <div
    class="fixed inset-0 z-50 flex items-center justify-center p-4 transition-all duration-200"
    [class.opacity-0]="!dialog.visible"
    [class.opacity-100]="dialog.visible"
    [class.pointer-events-none]="!dialog.visible"
    (click)="dialog.onCancel()"
  >
    <!-- Blur overlay -->
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>

    <!-- Card -->
    <div
      class="relative w-full max-w-sm bg-neutral-900 border border-white/10 rounded-2xl shadow-2xl p-6
             transition-all duration-200"
      [class.scale-95]="!dialog.visible"
      [class.opacity-0]="!dialog.visible"
      [class.scale-100]="dialog.visible"
      [class.opacity-100]="dialog.visible"
      (click)="$event.stopPropagation()"
    >
      <!-- Icon -->
      <div class="flex items-center justify-center w-11 h-11 rounded-xl mb-4"
        [class.bg-red-900\/30]="dialog.danger"
        [class.bg-neutral-800]="!dialog.danger">
        @if (dialog.danger) {
          <svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
        } @else {
          <svg class="w-5 h-5 text-neutral-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        }
      </div>

      <!-- Text -->
      <h2 class="text-base font-semibold text-white mb-1">{{ dialog.title }}</h2>
      <p class="text-sm text-neutral-400 leading-relaxed">{{ dialog.message }}</p>

      <!-- Actions -->
      <div class="flex gap-2 mt-6 justify-end">
        <button
          (click)="dialog.onCancel()"
          class="px-4 py-2 rounded-lg text-sm text-neutral-400 hover:text-white hover:bg-white/8 transition-colors"
        >{{ dialog.cancelLabel }}</button>

        <button
          (click)="dialog.onConfirm()"
          class="px-4 py-2 rounded-lg text-sm font-medium transition-colors"
          [class.bg-red-600]="dialog.danger"
          [class.hover:bg-red-500]="dialog.danger"
          [class.text-white]="dialog.danger"
          [class.bg-purple-600]="!dialog.danger"
          [class.hover:bg-purple-500]="!dialog.danger"
          [class.text-white]="!dialog.danger"
        >{{ dialog.confirmLabel }}</button>
      </div>
    </div>
  </div>

}
