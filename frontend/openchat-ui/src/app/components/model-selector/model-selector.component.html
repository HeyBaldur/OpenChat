<div class="relative">

  <!-- Trigger button — gradient border technique -->
  <div
    class="p-px rounded-lg transition-all"
    [class.bg-gradient-to-r]="!disabled && !unavailable()"
    [class.from-purple-600]="!disabled && !unavailable()"
    [class.to-blue-500]="!disabled && !unavailable()"
    [class.bg-neutral-700]="disabled || unavailable()"
    [class.opacity-50]="disabled"
    [title]="unavailable() ? 'Ollama is not running or no models installed' : ''"
  >
    <button
      (click)="toggle()"
      class="flex items-center gap-1.5 px-2.5 py-1 rounded-[calc(0.5rem-1px)] bg-neutral-900 text-xs font-medium text-neutral-200 hover:text-white transition-colors whitespace-nowrap"
      [class.cursor-not-allowed]="disabled || unavailable()"
    >
      <svg class="w-3 h-3 text-purple-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
      </svg>
      <span class="max-w-[140px] truncate">{{ selectedDisplay }}</span>
      @if (!unavailable()) {
        <svg class="w-3 h-3 text-neutral-500 shrink-0 transition-transform duration-200"
          [class.rotate-180]="isOpen()"
          fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      }
    </button>
  </div>

  <!-- Dropdown — right-aligned so it doesn't overflow the viewport -->
  @if (isOpen()) {
    <div class="absolute top-full mt-2 right-0 z-50 w-64 bg-neutral-900/95 backdrop-blur-md border border-neutral-800 rounded-xl shadow-xl shadow-black/40 overflow-hidden">

      @if (models().length === 0) {
        <div class="px-4 py-3 text-xs text-neutral-500 text-center">
          No models found. Run <code class="text-cyan-400">ollama pull qwen2.5:7b</code> to install one.
        </div>
      } @else {
        <div class="py-1 max-h-72 overflow-y-auto">
          @for (model of models(); track model.name) {
            <button
              (click)="select(model)"
              class="w-full flex items-center gap-3 px-3 py-2.5 text-left transition-colors"
              [class.bg-purple-500/15]="model.name === effectiveSelected"
              [class.hover:bg-purple-500/20]="model.name === effectiveSelected"
              [class.hover:bg-neutral-800]="model.name !== effectiveSelected"
            >
              <!-- Checkmark or spacer -->
              <div class="w-4 shrink-0 flex items-center justify-center">
                @if (model.name === effectiveSelected) {
                  <svg class="w-3.5 h-3.5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
                  </svg>
                }
              </div>

              <!-- Name + size -->
              <div class="flex-1 min-w-0">
                <p class="text-sm font-medium truncate"
                  [class.text-white]="model.name === effectiveSelected"
                  [class.text-neutral-300]="model.name !== effectiveSelected"
                >{{ model.displayName }}</p>
                <p class="text-xs text-neutral-500 mt-0.5">{{ model.sizeFormatted }}</p>
              </div>

              <!-- Tool calling badge -->
              @if (model.supportsToolCalling) {
                <span class="shrink-0 text-xs text-cyan-400 bg-cyan-500/10 border border-cyan-500/30 rounded-full px-2 py-0.5 leading-none">
                  Tools ✓
                </span>
              }
            </button>
          }
        </div>
      }
    </div>
  }

</div>
